<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Questionnaire — Shine, The Mentalist</title>
    <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(180deg, #f7f7fb 0%, #f0f1f5 100%);
        color: #1d1d1f;
        font-size: 15px;
        min-height: 100vh;
        padding: 16px 16px 40px
    }

    .page {
        max-width: 480px;
        margin: 0 auto
    }

    .header {
        text-align: center;
        padding: 28px 0 18px
    }

    .header .star {
        font-size: 30px;
        margin-bottom: 12px;
        display: inline-block;
        filter: drop-shadow(0 2px 6px rgba(0, 113, 227, 0.25))
    }

    .header h1 {
        font-size: 21px;
        font-weight: 700;
        letter-spacing: -0.01em
    }

    .header p {
        font-size: 13.5px;
        color: #6e6e73;
        margin-top: 8px;
        line-height: 1.6;
        padding: 0 8px
    }

    .section {
        background: #fff;
        border-radius: 18px;
        padding: 20px;
        margin-bottom: 14px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 8px 24px rgba(0, 0, 0, 0.05)
    }

    .section-title {
        font-size: 11.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #0071e3;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 6px
    }

    .field {
        margin-bottom: 18px
    }

    .field:last-child {
        margin-bottom: 0
    }

    .field label {
        display: block;
        font-size: 13.5px;
        color: #1d1d1f;
        margin-bottom: 7px;
        font-weight: 600;
        line-height: 1.4
    }

    .field .hint {
        font-size: 12px;
        color: #aeaeb2;
        font-weight: 400;
        display: block;
        margin-top: 2px
    }

    .field input, .field select, .field textarea {
        width: 100%;
        padding: 11px 13px;
        font-size: 15px;
        border: 1.5px solid #e5e5ea;
        border-radius: 11px;
        background: #fafafc;
        color: #1d1d1f;
        font-family: inherit;
        -webkit-appearance: none;
        transition: border-color 0.15s, background 0.15s
    }

    .field input:focus, .field select:focus, .field textarea:focus {
        outline: none;
        border-color: #0071e3;
        background: #fff
    }

    .field textarea {
        resize: vertical;
        min-height: 72px;
        line-height: 1.5
    }

    .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px
    }

    .radio-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 6px
    }

    .radio-option {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 14px 16px;
        border: 1.5px solid #e5e5ea;
        border-radius: 12px;
        cursor: pointer;
        background: #fafafc;
        transition: border-color 0.15s, background 0.15s
    }

    .radio-option input[type="radio"] {
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        margin: 1px 0 0 0;
        width: 21px;
        height: 21px;
        min-width: 21px;
        border-radius: 50%;
        border: 2px solid #d1d1d6;
        background: #fff;
        flex-shrink: 0;
        display: grid;
        place-content: center;
        transition: border-color 0.15s;
        cursor: pointer
    }

    .radio-option input[type="radio"]::before {
        content: '';
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: #0071e3;
        transform: scale(0);
        transition: transform 0.12s
    }

    .radio-option input[type="radio"]:checked::before {
        transform: scale(1)
    }

    .radio-option input[type="radio"]:checked {
        border-color: #0071e3
    }

    .radio-option span.label-text {
        font-size: 14.5px;
        font-weight: 500;
        line-height: 1.45;
        padding-top: 1px
    }

    .radio-option.selected {
        border-color: #0071e3;
        background: #f0f7ff
    }

    .submit-btn {
        width: 100%;
        padding: 16px;
        background: #0071e3;
        color: #fff;
        border: none;
        border-radius: 14px;
        font-size: 16.5px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        margin-top: 6px;
        box-shadow: 0 4px 14px rgba(0, 113, 227, 0.3);
        transition: transform 0.1s, box-shadow 0.1s
    }

    .submit-btn:active {
        transform: scale(0.98)
    }

    .submit-btn:disabled {
        background: #b0c8f0;
        box-shadow: none;
        cursor: not-allowed
    }

    .save-draft-btn {
        width: 100%;
        padding: 14px;
        background: transparent;
        color: #0071e3;
        border: 1.5px solid #d1d9f0;
        border-radius: 14px;
        font-size: 14.5px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        margin-top: 10px;
        transition: background 0.15s
    }

    .save-draft-btn:active {
        background: #f0f7ff
    }

    .save-draft-btn:disabled {
        color: #aeaeb2;
        border-color: #e5e5ea;
        cursor: not-allowed
    }

    .text-photo-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 10px;
        padding: 12px;
        background: #f0f7ff;
        color: #0071e3;
        border: 1.5px solid #cde0fc;
        border-radius: 11px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.15s
    }

    .text-photo-btn:active {
        background: #e0effe
    }

    .loading {
        text-align: center;
        padding: 60px 20px;
        color: #6e6e73
    }

    .success-screen {
        display: none;
        text-align: center;
        padding: 70px 16px
    }

    .success-screen.show {
        display: block
    }

    .success-screen .icon {
        font-size: 52px;
        margin-bottom: 18px;
        display: inline-block;
        filter: drop-shadow(0 2px 8px rgba(52, 199, 89, 0.3))
    }

    .success-screen h2 {
        font-size: 21px;
        font-weight: 700;
        margin-bottom: 10px
    }

    .success-screen p {
        font-size: 14.5px;
        color: #6e6e73;
        line-height: 1.7;
        padding: 0 12px
    }
    </style>
</head>
<body>
    <div class="page" id="main-page">
        <div class="header">
            <div class="star">✦</div>
            <h1 id="greeting-title">Event Details</h1>
            <p id="greeting-text">Loading your questionnaire...</p>
        </div>
        <div id="form-content"></div>
    </div>

    <div class="page" id="success-page" style="display:none">
        <div class="success-screen show">
            <div class="icon">✦</div>
            <h2>All set!</h2>
            <p>Thanks for filling that out — this helps me make your show personal and unforgettable. See you at the event!</p>
        </div>
    </div>

    <script>
    function getBookingId() {
        return new URLSearchParams(window.location.search).get('bid') || '';
    }

    let bookingData = null;

    function loadBooking() {
        fetch('/api/get-booking?mode=full&bid=' + getBookingId())
        .then(r => r.json())
        .then(data => {
            if (data.error)
                throw new Error(data.error);
            bookingData = data;
            renderForm(data);
        })
        .catch(e => {
            document.getElementById('form-content').innerHTML = '<div class="loading">Could not load this form. Please contact Shine directly.</div>';
        });
    }

    function escapeAttr(str) {
        return String(str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    }

    function radioGroup(name, options) {
        return options.map((opt, i) =>
        '<label class="radio-option" for="' + name + '-' + i + '">' +
        '<input type="radio" name="' + name + '" value="' + opt + '" id="' + name + '-' + i + '" onchange="onRadioChange(this)">' +
        '<span class="label-text">' + opt + '</span>' +
        '</label>'
        ).join('');
    }

    function onRadioChange(input) {
        document.querySelectorAll('input[name="' + input.name + '"]').forEach(function(r) {
            r.closest('.radio-option').classList.remove('selected');
        });
        input.closest('.radio-option').classList.add('selected');
    }

    // Generates a consistent photo-link field across every event type: a label, a hint with
    // the inline text-link as a fallback, the URL input itself, and a prominent standalone
    // button to open Messages directly — since most people send photos by text, not a link.
    function photoField(fieldId, personLabel, opts) {
        opts = opts || {};
        const labelText = opts.labelText || ('Link to a photo of ' + personLabel);
        const hintText = opts.hintText || '(Google Drive, Dropbox, or any shareable link, or text it to me at <a href="sms:+16128657681" style="color:#0071e3;text-decoration:none">+1 (612) 865-7681</a>)';
        return `
      <div class="field">
        <label>${labelText} <span class="hint">${hintText}</span></label>
        <input type="text" id="${fieldId}" placeholder="https://...">
        <a href="sms:+16128657681" class="text-photo-btn">📱 Text me the photo instead</a>
      </div>
    `;
    }

    function renderForm(d) {
        const firstName = (d.clientName || '').split(' ')[0];
        document.getElementById('greeting-title').textContent = 'Hi ' + firstName + ',';
        document.getElementById('greeting-text').textContent = "Thank you for booking my show! This short questionnaire helps me personalize the experience and ensure everything runs smoothly for your event. — Shine, The Mentalist";

        const eventType = (d.eventType || '').toLowerCase();
        let html = '';

        // Section 1: Event basics
        html += '<div class="section"><div class="section-title">📍 Event basics</div>';
        html += `
    <div class="field">
      <label>Event date</label>
      <input type="date" id="q_event_date" value="${

        d.eventDate || ''}">
    </div>
    <div class="two-col">
      <div class="field">
        <label>Start time</label>
        <input type="time" id="q_start_time">
      </div>
      <div class="field">
        <label>Guest count</label>
        <input type="text" id="q_guests" placeholder="e.g. 25">
      </div>
    </div>
    <div class="field">
      <label>Event location / address</label>
      <input type="text" id="q_address" placeholder="Full address">
    </div>
    <div class="field">
      <label>Indoor or outdoor event?</label>
      <div class="radio-group">${
















        radioGroup('q_indoor_outdoor', ['Indoor', 'Outdoor', 'Both'])}</div>
    </div>
  `

        ;
        html += '</div>';

        // Section 2: Event-specific questions
        html += '<div class="section"><div class="section-title">🎉 About your event</div>';

        if (eventType.includes('bachelorette')) {
            html += `
      <div class="field"><label>Bride's full name</label><input type="text" id="q_honoree"></div>
      <div class="field"><label>Bride's date of birth</label><input type="date" id="q_honoree_dob"></div>
      <div class="field"><label>Groom's date of birth</label><input type="date" id="q_groom_dob"></div>
      <div class="field"><label>Wedding day</label><input type="date" id="q_wedding_date"></div>
      <div class="field"><label>Any VIPs or special people attending?</label><input type="text" id="q_vips"></div>
      <div class="field"><label>Anyone who should NOT be involved?</label><input type="text" id="q_exclude"></div>
      <div class="field"><label>What kind of vibe are you looking for?</label>
        <div class="radio-group">${




            radioGroup('q_vibe', ['Clean elegant & classy', 'Light adult humor', 'Slightly edgy / flirty', 'Bold & edgy'])}</div>
      </div>
      <div class="field"><label>Any other entertainment before or after my show?</label><textarea id="q_other_entertainment"></textarea></div>
      <div class="field"><label>Tell me about the bride <span class="hint">(personality, hobbies, a funny or embarrassing story, anything most people don't know — I'll use this to personalize the show and a few custom touches)</span></label><textarea id="q_trivia_bride"></textarea></div>
      <div class="field"><label>Tell me about the groom <span class="hint">(personality, hobbies, a funny or embarrassing story, anything most people don't know — I'll use this to personalize the show and a few custom touches)</span></label><textarea id="q_trivia_groom"></textarea></div>
      ${photoField('q_photo_bride', 'the bride', { labelText: 'Please share a photo of the bride, with or without the groom', hintText: 'You can give the link here for the photo or share with me via text. (Google Drive, Dropbox, or any shareable link, or text it to me at <a href="sms:+16128657681" style="color:#0071e3;text-decoration:none">+1 (612) 865-7681</a>)' })}
      <div class="field"><label>Anything else I should know? <span class="hint">(how they met, the proposal story, etc.)</span></label><textarea id="q_anything_else"></textarea></div>
    `





            ;
        } else if (eventType.includes('bachelor')) {
            html += `
      <div class="field"><label>Groom's full name</label><input type="text" id="q_honoree"></div>
      <div class="field"><label>Groom's date of birth</label><input type="date" id="q_honoree_dob"></div>
      <div class="field"><label>Any VIPs or special people attending?</label><input type="text" id="q_vips"></div>
      <div class="field"><label>Anyone who should NOT be involved?</label><input type="text" id="q_exclude"></div>
      <div class="field"><label>What kind of vibe are you looking for?</label>
        <div class="radio-group">${




            radioGroup('q_vibe', ['Clean elegant & classy', 'Light adult humor', 'Slightly edgy / flirty', 'Bold & edgy'])}</div>
      </div>
      <div class="field"><label>Any other entertainment before or after my show?</label><textarea id="q_other_entertainment"></textarea></div>
      <div class="field"><label>Tell me about the groom <span class="hint">(personality, hobbies, a funny or embarrassing story, anything most people don't know — I'll use this to personalize the show and a few custom touches)</span></label><textarea id="q_trivia_groom"></textarea></div>
      ${photoField('q_photo_groom', 'the groom')}
      <div class="field"><label>Anything else I should know? <span class="hint">(how they met, the proposal story, etc.)</span></label><textarea id="q_anything_else"></textarea></div>
    `





            ;
        } else if (eventType.includes('birthday')) {
            html += `
      <div class="field"><label>Type of crowd</label>
        <div class="radio-group">${
            radioGroup('q_crowd', ['All adults', 'Include kids', 'Family crowd'])}</div>
      </div>
      <div class="field"><label>Full name of guest of honor</label><input type="text" id="q_honoree"></div>
      <div class="field"><label>Actual date of birth</label><input type="date" id="q_honoree_dob"></div>
      <div class="field"><label>Any VIPs or special people attending?</label><input type="text" id="q_vips"></div>
      <div class="field"><label>Anyone who should NOT be involved?</label><input type="text" id="q_exclude"></div>
      <div class="field"><label>What kind of vibe are you looking for?</label>
        <div class="radio-group">${





            radioGroup('q_vibe', ['Clean elegant & classy', 'Family friendly', 'Light adult humor', 'Slightly edgy / flirty', 'Bold & edgy'])}</div>
      </div>
      <div class="field"><label>Tell me about the birthday person <span class="hint">(personality, hobbies, a funny or embarrassing story, anything most people don't know — I'll use this to personalize the show and a few custom touches)</span></label><textarea id="q_trivia"></textarea></div>
      ${photoField('q_photo_honoree', 'the birthday person')}
    `



            ;
        } else if (eventType.includes('anniversary')) {
            html += `
      <div class="two-col">
        <div class="field"><label>Spouse 1's full name</label><input type="text" id="q_spouse1_name"></div>
        <div class="field"><label>Spouse 2's full name</label><input type="text" id="q_spouse2_name"></div>
      </div>
      <div class="field"><label>Date of marriage</label><input type="date" id="q_marriage_date"></div>
      <div class="field"><label>Any VIPs or special people attending?</label><input type="text" id="q_vips"></div>
      <div class="field"><label>Anyone who should NOT be involved?</label><input type="text" id="q_exclude"></div>
      <div class="field"><label>What kind of vibe are you looking for?</label>
        <div class="radio-group">${







            radioGroup('q_vibe', ['Clean elegant & classy', 'Family friendly', 'Light adult humor', 'Slightly edgy / flirty', 'Bold & edgy'])}</div>
      </div>
      <div class="field"><label>Tell me about spouse 1 <span class="hint">(personality, hobbies, a funny or embarrassing story, anything most people don't know)</span></label><textarea id="q_trivia_spouse1"></textarea></div>
      ${photoField('q_photo_spouse1', 'spouse 1', { hintText: '(or text it to me at <a href="sms:+16128657681" style="color:#0071e3;text-decoration:none">+1 (612) 865-7681</a>)' })}
      <div class="field"><label>Tell me about spouse 2 <span class="hint">(personality, hobbies, a funny or embarrassing story, anything most people don't know)</span></label><textarea id="q_trivia_spouse2"></textarea></div>
      ${photoField('q_photo_spouse2', 'spouse 2', { hintText: '(or text it to me at <a href="sms:+16128657681" style="color:#0071e3;text-decoration:none">+1 (612) 865-7681</a>)' })}
      <div class="field"><label>Anything else I should know? <span class="hint">(how they met, favorite memories, etc.)</span></label><textarea id="q_anything_else"></textarea></div>
    `






            ;
        } else if (eventType.includes('corporate')) {
            html += `
      <div class="field"><label>Type of crowd</label>
        <div class="radio-group">${
            radioGroup('q_crowd', ['All adults', 'Mixed group', 'Executives / VIPs'])}</div>
      </div>
      <div class="field"><label>Any VIPs or executives attending?</label><input type="text" id="q_vips"></div>
      <div class="field"><label>Company name / event theme</label><input type="text" id="q_theme"></div>
      <div class="field"><label>Anyone who should NOT be involved?</label><input type="text" id="q_exclude"></div>
      <div class="field"><label>What kind of vibe are you looking for?</label>
        <div class="radio-group">${




            radioGroup('q_vibe', ['Clean elegant & classy', 'Family friendly', 'Light adult humor'])}</div>
      </div>
      <div class="field"><label>Inside jokes, themes, or fun facts I can use?</label><textarea id="q_inside_jokes"></textarea></div>
    `


            ;
        } else if (eventType.includes('graduation')) {
            html += `
      <div class="field"><label>Type of crowd</label>
        <div class="radio-group">${
            radioGroup('q_crowd', ['All adults', 'Include kids', 'Family crowd'])}</div>
      </div>
      <div class="field"><label>Name of the person graduating</label><input type="text" id="q_honoree"></div>
      <div class="field"><label>Their date of birth</label><input type="date" id="q_honoree_dob"></div>
      <div class="field"><label>Anyone you'd like me to definitely involve in the show?</label><input type="text" id="q_special_attention"></div>
      <div class="field"><label>Anyone who should NOT be involved?</label><input type="text" id="q_exclude"></div>
      <div class="field"><label>What kind of vibe are you looking for?</label>
        <div class="radio-group">${





            radioGroup('q_vibe', ['Clean elegant & classy', 'Family friendly', 'Light adult humor', 'Slightly edgy / flirty', 'Bold & edgy'])}</div>
      </div>
      <div class="field"><label>Any other entertainment before or after my show?</label><textarea id="q_other_entertainment"></textarea></div>
      <div class="field"><label>Tell me about the graduate <span class="hint">(personality, hobbies, a funny or embarrassing story, anything most people don't know — I'll use this to personalize the show and a few custom touches)</span></label><textarea id="q_trivia"></textarea></div>
      ${photoField('q_photo_honoree', 'the graduate')}
    `




            ;
        } else if (eventType.includes('baby shower') || eventType.includes('baby')) {
            html += `
      <div class="field"><label>Type of crowd</label>
        <div class="radio-group">${
            radioGroup('q_crowd', ['All adults', 'Family crowd'])}</div>
      </div>
      <div class="field"><label>Name(s) of the parent(s)-to-be</label><input type="text" id="q_honoree"></div>
      <div class="field"><label>Baby's name <span class="hint">(if already decided)</span></label><input type="text" id="q_baby_name"></div>
      <div class="field"><label>Due date</label><input type="date" id="q_due_date"></div>
      <div class="field"><label>Has the gender already been revealed?</label>
        <div class="radio-group">${




            radioGroup('q_gender_revealed', ['Yes', 'No — this IS the reveal', 'Not sharing / surprise'])}</div>
      </div>
      <div class="field"><label>Any VIPs or special people attending?</label><input type="text" id="q_vips"></div>
      <div class="field"><label>Anyone who should NOT be involved?</label><input type="text" id="q_exclude"></div>
      <div class="field"><label>What kind of vibe are you looking for?</label>
        <div class="radio-group">${



            radioGroup('q_vibe', ['Clean elegant & classy', 'Family friendly', 'Light adult humor'])}</div>
      </div>
      <div class="field"><label>Tell me about the parent(s)-to-be <span class="hint">(personality, hobbies, a funny story, anything most people don't know)</span></label><textarea id="q_trivia"></textarea></div>
      ${photoField('q_photo_honoree', 'the parent(s)-to-be')}
    `



            ;
        } else {
            // General / private celebration
            html += `
      <div class="field"><label>Type of crowd</label>
        <div class="radio-group">${
            radioGroup('q_crowd', ['All adults (mixed)', 'Family crowd', 'Include kids'])}</div>
      </div>
      <div class="field"><label>What is the occasion you are celebrating?</label><input type="text" id="q_occasion" value="${
            (eventType && eventType !== 'other') ? escapeAttr(d.eventType) : ''}"></div>
      <div class="field"><label>Is it someone's special day?</label><input type="text" id="q_special_day" placeholder="Name, if applicable"></div>
      <div class="field"><label>Their date of birth <span class="hint">(if applicable)</span></label><input type="date" id="q_honoree_dob"></div>
      <div class="field"><label>Any VIPs or special people attending?</label><input type="text" id="q_vips"></div>
      <div class="field"><label>Anyone you'd like me to give special attention to in the show?</label><input type="text" id="q_special_attention"></div>
      <div class="field"><label>Anyone who should NOT be involved?</label><input type="text" id="q_exclude"></div>
      <div class="field"><label>What kind of vibe are you looking for?</label>
        <div class="radio-group">${





            radioGroup('q_vibe', ['Clean elegant & classy', 'Family friendly', 'Light adult humor', 'Slightly edgy / flirty', 'Bold & edgy'])}</div>
      </div>
      <div class="field"><label>Any other entertainment before or after my show?</label><textarea id="q_other_entertainment"></textarea></div>
      <div class="field"><label>If there's a guest of honor, tell me about them <span class="hint">(personality, hobbies, a funny story, anything most people don't know — optional)</span></label><textarea id="q_trivia"></textarea></div>
      ${photoField('q_photo_honoree', 'the guest of honor', { hintText: '(optional — Google Drive, Dropbox, or any shareable link, or text it to me at <a href="sms:+16128657681" style="color:#0071e3;text-decoration:none">+1 (612) 865-7681</a>)' })}
    `




            ;
        }
        html += '</div>';

        // Section 3: Logistics
        html += '<div class="section"><div class="section-title">⚡ Logistics</div>';
        html += `
    <div class="field">
      <label>Will there be a clear area for the show?</label>
      <div class="radio-group">${

        radioGroup('q_clear_area', ['Yes', 'Somewhat', 'Not sure yet'])}</div>
    </div>
    <div class="field">
      <label>Is access to a power outlet available?</label>
      <div class="radio-group">${


        radioGroup('q_power', ['Yes', 'No', 'Not sure'])}</div>
    </div>
  `

        ;
        html += '</div>';

        html += '<button class="submit-btn" id="submit-btn" onclick="submitIntake(false)">Submit questionnaire</button>';
        html += '<button class="save-draft-btn" id="save-draft-btn" onclick="submitIntake(true)">Save and finish later</button>';

        document.getElementById('form-content').innerHTML = html;
        prefillSavedAnswers(d.savedAnswers || {});
    }

    function prefillSavedAnswers(saved) {
        Object.keys(saved).forEach(function(key) {
            const value = saved[key];
            if (value === null || value === undefined || value === '') return;

            // Radio groups are saved under their group name (e.g. q_vibe), not an element id
            const radioInGroup = document.querySelector('input[name="' + key + '"][value="' + String(value).replace(/"/g, '\\"') + '"]');
            if (radioInGroup) {
                radioInGroup.checked = true;
                onRadioChange(radioInGroup);
                return;
            }

            const field = document.getElementById(key);
            if (field) field.value = value;
        });
    }

    function submitIntake(isDraft) {
        const submitBtn = document.getElementById('submit-btn');
        const draftBtn = document.getElementById('save-draft-btn');
        const activeBtn = isDraft ? draftBtn : submitBtn;
        submitBtn.disabled = true;
        draftBtn.disabled = true;
        activeBtn.textContent = isDraft ? 'Saving...' : 'Submitting...';

        const answers = {};
        document.querySelectorAll('#form-content input, #form-content textarea, #form-content select').forEach(el => {
            if (el.type === 'radio') {
                if (el.checked)
                    answers[el.name] = el.value;
            } else if (el.id) {
                answers[el.id] = el.value;
            }
        });

        fetch('/api/submit-intake', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                bookingId: getBookingId(),
                answers: answers,
                draft: isDraft
            })
        })
        .then(r => r.json())
        .then(data => {
            if (data.error)
                throw new Error(data.error);
            if (isDraft) {
                draftBtn.textContent = '✓ Saved — come back anytime to finish';
                setTimeout(() => {
                    submitBtn.disabled = false;
                    draftBtn.disabled = false;
                    draftBtn.textContent = 'Save and finish later';
                }, 3000);
            } else {
                document.getElementById('main-page').style.display = 'none';
                document.getElementById('success-page').style.display = 'block';
            }
        })
        .catch(e => {
            alert('Something went wrong — please try again.');
            submitBtn.disabled = false;
            draftBtn.disabled = false;
            submitBtn.textContent = 'Submit questionnaire';
            draftBtn.textContent = 'Save and finish later';
        });
    }

    loadBooking();
    </script>
</body>
</html>
